name: CI

on: [pull_request]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run make:static
      - run: npm run lint
      - run: npm run build
      - run: npm run build:tests
      - run: npm test
